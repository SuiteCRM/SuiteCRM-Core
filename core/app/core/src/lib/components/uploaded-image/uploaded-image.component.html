<div class="pb-2 d-flex uploaded-image-container">
    <div *ngIf="file?.status() === 'uploaded' || (file?.status() === 'saved' && file?.id.length > 0)" class="uploaded-image-wrapper">

        <div *ngIf="allowClear" class="uploaded-image-hover-container">
            <ng-container *ngTemplateOutlet="image"></ng-container>
            <scrm-button class="uploaded-image-hover-overlay" [config]="clearButtonConfig">
            </scrm-button>
        </div>

        <div *ngIf="!allowClear">
            <ng-container *ngTemplateOutlet="image"></ng-container>
        </div>
    </div>
</div>

<ng-template #image>
    <ng-container *ngIf="showThumbnail && file?.thumbnailUrl">
        <img [src]="file?.thumbnailUrl"
             alt="{{ file?.name || 'uploaded-image-thumbnail' }}"
             class="uploaded-image"
             [style.height]="maxHeight"
             [style.width]="maxWidth"
        >
    </ng-container>
    <img *ngIf="file?.contentUrl && (!showThumbnail || !file?.thumbnailUrl)"
         [src]="file?.contentUrl"
         alt="{{ file?.name || 'uploaded-image' }}"
         class="uploaded-image"
         [style.height]="maxHeight"
         [style.width]="maxWidth"
    >
</ng-template>
