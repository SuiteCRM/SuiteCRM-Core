<ng-container *ngIf="!isConfigured()">
    <scrm-label labelKey="LBL_BAD_GROUP_FIELD_CONFIG"></scrm-label>
</ng-container>

<ng-container *ngIf="isConfigured()">
    <div #wrapper
         class="d-flex {{direction()}} justify-content-start align-items-start field-group h-100 w-100 composite-field-wrapper">

        <ng-container *ngFor="let attribute of getAttributes()">
            <div [class.flex-fill]="mode ==='edit' && direction() === 'flex-row'"
                 [class.w-100]="attribute?.definition?.metadata?.widthFull ?? true"
                 [class.w-auto]="attribute?.definition?.metadata?.widthAuto ?? false"
                 [class.flex-column]="attribute?.definition?.metadata?.labelDisplay !== 'inline'"
                 [class.h-100]="direction() === 'flex-row'"
                 class="field-group-item d-flex justify-content-end">

                <!-- LABEL -->
                <span *ngIf="attribute.labelKey && showLabel(attribute)"
                      class="field-group-label"
                      [class.pt-2]="attribute?.definition?.metadata?.labelDisplay !== 'inline'"
                      [class.pr-1]="attribute?.definition?.metadata?.labelDisplay !== 'inline'"
                      [class.mr-1]="attribute?.definition?.metadata?.labelDisplay === 'inline'"
                      [class.d-none]="attribute?.definition?.metadata?.labelDisplay === 'none'">
                    <label [class.m-0]="attribute?.definition?.metadata?.labelDisplay === 'inline'">
                        <scrm-label [labelKey]="attribute.labelKey" [module]="getModule()"></scrm-label>
                        <ng-container *ngIf="attribute?.required() && (['edit', 'create'].includes(mode))">
                            <span class="required">*</span>
                        </ng-container>
                    </label>
                </span>

                <!-- VALUE -->
                <span *ngIf="attribute.type"
                      class="field-group-field pr-1 composite-field"
                      [class.flex-grow-1]="attribute?.definition?.metadata?.labelDisplay === 'inline'">

                    <scrm-dynamic-field [componentType]="getComponentType(attribute.type, attribute.definition)"
                                        [field]="attribute"
                                        [klass]="klass"
                                        [mode]="getMode()"
                                        [originalMode]="originalMode"
                                        [record]="record"
                                        [parent]="parent"
                                        [type]="attribute.type">
                    </scrm-dynamic-field>

                </span>
            </div>
        </ng-container>
    </div>
</ng-container>
