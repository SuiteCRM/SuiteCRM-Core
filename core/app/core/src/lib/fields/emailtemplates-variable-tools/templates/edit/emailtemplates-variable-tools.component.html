<div class="d-flex flex-column gap-2">
    <div class="d-flex flex-wrap align-items-center gap-2">
        <div class="d-flex align-items-center gap-2">
            <select class="form-control form-control-sm" [disabled]="!loaded" [(ngModel)]="selectedModule" [ngModelOptions]="{standalone: true}" (change)="onModuleChange()">
                <option *ngFor="let m of modules" [ngValue]="m.key">{{m.label}}</option>
            </select>

            <select class="form-control form-control-sm" [disabled]="!loaded" [(ngModel)]="selectedField" [ngModelOptions]="{standalone: true}" (change)="onFieldChange()">
                <option *ngFor="let f of fields" [ngValue]="f.name">{{f.value}}</option>
            </select>
        </div>

        <div class="d-flex align-items-center gap-2 flex-grow-1">
            <span>:</span>
            <input class="form-control form-control-sm" type="text" [value]="variableText" readonly />
        </div>

        <div class="d-flex align-items-center gap-2">
            <button type="button" class="btn btn-sm btn-outline-secondary" (click)="insertToSubject()" [disabled]="!variableText">Insert</button>
            <button type="button" class="btn btn-sm btn-outline-secondary" (click)="insertToBody()" [disabled]="!variableText">Insert to body</button>
        </div>
    </div>
</div>
