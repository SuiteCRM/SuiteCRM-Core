<div class="image-field-container">
    <ng-container *ngIf="!loading() && uploadedFile()">

        <div class="thumbnail-image" *ngIf="showThumbnail && uploadedFile()?.thumbnailUrl !== ''">
            <p-image
                    [height]="maxHeight"
                    [loading]="'lazy'"
                    [imageStyle]="{ 'max-height': maxHeight, 'width': '100%', 'max-width': maxWidth }"
                    [previewImageSrc]="uploadedFile()?.contentUrl"
                    src="{{ uploadedFile()?.thumbnailUrl }}"
                    alt="{{ uploadedFile()?.name || 'uploaded-image' }}"
                    [preview]="preview">
                <ng-template pTemplate="indicator">
                    <ng-container *ngTemplateOutlet="preview"></ng-container>
                </ng-template>
            </p-image>
        </div>

        <ng-container *ngIf="!showThumbnail || uploadedFile()?.thumbnailUrl === ''">
            <p-image
                    [height]="maxHeight"
                    [loading]="'lazy'"
                    [imageStyle]="{ 'max-height': maxHeight, 'width': '100%', 'max-width': maxWidth }"
                    src="{{ uploadedFile()?.contentUrl }}"
                    alt="{{ uploadedFile()?.name || 'uploaded-image' }}"
                    [preview]="preview">

                <ng-template pTemplate="indicator">
                    <ng-container *ngTemplateOutlet="preview"></ng-container>
                </ng-template>
            </p-image>
        </ng-container>

    </ng-container>


    <ng-container *ngIf="loading()">
        <scrm-image-skeleton [height]="maxHeight" ></scrm-image-skeleton>
    </ng-container>
</div>

<ng-template #preview>
    <div class="d-flex flex-row align-items-center justify-content-around w-100">
        <scrm-image [image]="'eye'" [titleKey]="'LBL_PREVIEW_IMAGE'"></scrm-image>
        <a [href]="uploadedFile()?.contentUrl" download class="d-flex pl-3 clickable" target="_blank"
           (click)="$event.stopPropagation()">
            <scrm-image [image]="'download-arrow'" [titleKey]="'LBL_DOWNLOAD_IMAGE'"></scrm-image>
        </a>
    </div>
</ng-template>
