<ng-container *ngIf="!storageType">
    <scrm-label labelKey="LBL_FIELD_STORAGE_NOT_SET"></scrm-label>
</ng-container>

<ng-container *ngIf="storageType && !isValidStorageType">
    <scrm-label labelKey="LBL_FIELD_STORAGE_INVALID_TYPE"></scrm-label>
</ng-container>


<div *ngIf="storageType && isValidStorageType" class="d-flex image-field-container">
    <scrm-file-upload-area #uploadArea
                           [class.d-flex]="displayUploadArea()"
                           [class.d-none]="!displayUploadArea() || loading()"
                           [class.flex-grow-1]="displayUploadArea()"
                           [uploadLabel]="'LBL_UPLOAD_IMAGE'"
                           [uploadDescription]="'LBL_UPLOAD_IMAGE_DESCRIPTION'"
                           [enabled]="displayUploadArea"
                           (onFileAdd)="onFileAdd($event)"
    ></scrm-file-upload-area>

    <ng-container *ngIf="!loading()">
        <scrm-uploaded-file @scaleInOut
                            *ngIf="uploadedFile()?.status() === 'error' || uploadedFile()?.status() === 'uploading'"
                            [file]="uploadedFile()" (clear)="clearUpload()"
        >
        </scrm-uploaded-file>

        <div @scaleIn *ngIf="uploadedFile()?.status() === 'uploaded' || uploadedFile()?.status() === 'saved'">
            <scrm-uploaded-image [file]="uploadedFile()"
                                 [maxHeight]="maxHeight"
                                 [maxWidth]="maxWidth"
                                 [showThumbnail]="showThumbnail"
                                 (clear)="clearUpload()">
            </scrm-uploaded-image>
        </div>
    </ng-container>

    <ng-container *ngIf="loading()">
        <scrm-file-skeleton></scrm-file-skeleton>
    </ng-container>
</div>
